<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Snake Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f0f;
      color: #e0e0e0;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 16px;
    }
    h1 { font-size: 2rem; color: #4ade80; letter-spacing: 4px; text-transform: uppercase; }
    #score-board { font-size: 1.1rem; color: #a3a3a3; }
    #score-board span { color: #4ade80; font-size: 1.3rem; font-weight: bold; }
    canvas { border: 2px solid #4ade80; box-shadow: 0 0 24px #4ade8055; background: #111; }
    #message { font-size: 1.2rem; color: #f87171; min-height: 28px; letter-spacing: 2px; }
    button {
      background: #4ade80; color: #0f0f0f; border: none;
      padding: 10px 28px; font-family: 'Courier New', monospace;
      font-size: 1rem; font-weight: bold; cursor: pointer;
      letter-spacing: 1px; transition: background 0.2s;
    }
    button:hover { background: #86efac; }
    #hint { font-size: 0.8rem; color: #555; letter-spacing: 1px; }
  </style>
</head>
<body>
  <h1>🐍 Snake</h1>
  <div id="score-board">Score: <span id="score">0</span></div>
  <canvas id="canvas" width="400" height="400"></canvas>
  <div id="message"></div>
  <button onclick="startGame()">New Game</button>
  <div id="hint">Use arrow keys or WASD to move</div>

  <script>
    const GRID = 20;
    const CELL = 400 / GRID;
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    let state = null;
    let loop = null;
    let pendingDir = null;
    let speed = 150;

    const dirMap = {
      ArrowUp: 'UP', ArrowDown: 'DOWN', ArrowLeft: 'LEFT', ArrowRight: 'RIGHT',
      w: 'UP', s: 'DOWN', a: 'LEFT', d: 'RIGHT',
      W: 'UP', S: 'DOWN', A: 'LEFT', D: 'RIGHT'
    };
    const opposites = { UP: 'DOWN', DOWN: 'UP', LEFT: 'RIGHT', RIGHT: 'LEFT' };

    document.addEventListener('keydown', e => {
      const dir = dirMap[e.key];
      if (dir && state && state.alive) {
        if (dir !== opposites[state.direction]) pendingDir = dir;
        e.preventDefault();
      }
    });

    async function startGame() {
      clearInterval(loop);
      document.getElementById('message').textContent = '';
      const res = await fetch('/api/new-game');
      state = await res.json();
      pendingDir = null;
      speed = 150;
      draw();
      loop = setInterval(tick, speed);
    }

    async function tick() {
      if (!state || !state.alive) return;
      if (pendingDir) { state.direction = pendingDir; pendingDir = null; }

      const res = await fetch('/api/move', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(state)
      });
      state = await res.json();
      document.getElementById('score').textContent = state.score;

      const newSpeed = Math.max(60, 150 - Math.floor(state.score / 50) * 15);
      if (newSpeed !== speed) {
        speed = newSpeed;
        clearInterval(loop);
        loop = setInterval(tick, speed);
      }

      draw();
      if (!state.alive) {
        clearInterval(loop);
        document.getElementById('message').textContent = '💀 GAME OVER — Press New Game';
      }
    }

    function draw() {
      ctx.clearRect(0, 0, 400, 400);
      ctx.fillStyle = '#1a1a1a';
      for (let x = 0; x < GRID; x++)
        for (let y = 0; y < GRID; y++) {
          ctx.beginPath();
          ctx.arc(x * CELL + CELL/2, y * CELL + CELL/2, 1, 0, Math.PI*2);
          ctx.fill();
        }

      if (!state) return;

      const f = state.food;
      ctx.fillStyle = '#f87171';
      ctx.shadowColor = '#f87171';
      ctx.shadowBlur = 10;
      ctx.beginPath();
      ctx.arc(f.x * CELL + CELL/2, f.y * CELL + CELL/2, CELL/2 - 2, 0, Math.PI*2);
      ctx.fill();
      ctx.shadowBlur = 0;

      state.snake.forEach((seg, i) => {
        const alpha = i === 0 ? 1 : Math.max(0.4, 1 - i * 0.04);
        ctx.fillStyle = i === 0 ? '#4ade80' : `rgba(74, 222, 128, ${alpha})`;
        if (i === 0) { ctx.shadowColor = '#4ade80'; ctx.shadowBlur = 8; }
        const pad = i === 0 ? 1 : 2;
        ctx.beginPath();
        ctx.roundRect(seg.x * CELL + pad, seg.y * CELL + pad, CELL - pad*2, CELL - pad*2, 3);
        ctx.fill();
        ctx.shadowBlur = 0;
      });
    }

    draw();
  </script>
</body>
</html>
